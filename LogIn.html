<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="./logincss.css">
</head>

<body>

<div class="container">
    <div class="main-heading">
        <h1>Sign In Here!</h1>
    </div>

    <div class="form-cont">
        <div class="login">
            <form id="loginForm">
                <label>Enter name</label>
                <input type="text" required>

                <label>Enter password</label>
                <input type="password" minlength="8" required>

                <button type="submit" id="loginbtn">Sign In</button>
            </form>

            <div class="recaptcha" id="recaptchaBox" style="display:none;">
                <label>What is the sum of these two numbers?</label>
                <label id="number"></label>
                <input type="number" id="captchaInput">
                <button onclick="validateCaptcha()">Verify</button>
            </div>
        </div>

        <div class="login-img">
            <img height="100%" width="300vw"
            src="https://static.vecteezy.com/system/resources/previews/007/164/537/non_2x/fingerprint-identity-sensor-data-protection-system-podium-hologram-blue-light-and-concept-free-vector.jpg">
        </div>
    </div>
</div>

<script>

let num1, num2;
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();   

    document.getElementById("recaptchaBox").style.display = "block";
    num1 = Math.floor(Math.random() * 10) + 1;
    num2 = Math.floor(Math.random() * 10) + 1;

    document.getElementById("number").innerText = num1 + " + " + num2;
});
function validateCaptcha(){
    let userAnswer = document.getElementById("captchaInput").value;

    if(parseInt(userAnswer) === (num1 + num2)){
        alert("Login Successful ✅");
        window.location.href = "hostel.html"; 
    } else {
        alert("Wrong Answer ❌ Try Again");
    }
}

</script>

</body>
</html>
